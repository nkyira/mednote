<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urgences Chirurgie Générale</title>
<style>
:root {
  --bg: #f3f4f6;
  --surface: #ffffff;
  --border: #e5e7eb;
  --border-strong: #d1d5db;
  --text: #111827;
  --muted: #6b7280;
  --hint: #9ca3af;
  --accent: #1d4ed8;
  --accent-bg: #eff6ff;
  --accent-border: #bfdbfe;
  --green: #15803d;
  --green-bg: #f0fdf4;
  --green-border: #bbf7d0;
  --red: #b91c1c;
  --red-bg: #fef2f2;
  --red-border: #fecaca;
  --orange: #c2410c;
  --orange-bg: #fff7ed;
  --orange-border: #fed7aa;
  --purple: #6d28d9;
  --purple-bg: #f5f3ff;
  --purple-border: #ddd6fe;
  --teal: #0f766e;
  --teal-bg: #f0fdfa;
  --teal-border: #99f6e4;
  --r: 10px;
  --rs: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.hdr-logo{width:38px;height:38px;border-radius:9px;background:#991b1b;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0}
.hdr-info{flex:1;min-width:120px}
.hdr-title{font-size:15px;font-weight:700;color:var(--text)}
.hdr-sub{font-size:12px;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-time{font-size:12px;color:var(--hint)}
.btn-exp{padding:8px 16px;border-radius:var(--rs);background:#991b1b;color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-exp:hover{background:#7f1d1d}

/* LAYOUT */
.main{max-width:980px;margin:0 auto;padding:16px 14px 60px}

/* PROGRESS BAR */
.progress-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.prog-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
.prog-dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);transition:background .3s}
.prog-dot.done{background:var(--green)}
.prog-dot.active{background:var(--accent)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:box-shadow .2s}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.09)}
.card-head{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:background .12s}
.card-head:hover{background:#fafafa}
.card-head.open{border-bottom-color:var(--border)}
.card-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.card-title{font-size:14px;font-weight:600;flex:1}
.card-prev{font-size:12px;color:var(--muted);max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-chev{width:16px;height:16px;flex-shrink:0;color:var(--hint);transition:transform .2s}
.card-chev.open{transform:rotate(90deg)}
.card-chev svg{display:block;width:16px;height:16px}
.card-body{padding:14px 16px;display:none}
.card-body.open{display:block}

/* LABELS */
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--hint);margin:14px 0 7px}
.sec-lbl:first-child{margin-top:0}
.sec-lbl.warn{color:var(--red)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;user-select:none;transition:all .12s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.chip.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600}
.chip.on::before{content:'✓ ';font-size:11px}
.chip.on.g{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.chip.on.r{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.chip.on.o{background:var(--orange-bg);border-color:var(--orange-border);color:var(--orange)}
.chip.on.p{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple)}
.chip.on.t{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal)}
.chip.radio.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600}

/* AGE */
.age-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.age-in{width:80px;padding:6px 10px;border:1px solid var(--border-strong);border-radius:var(--rs);font-size:15px;font-weight:600;color:var(--text);font-family:inherit}
.age-in:focus{outline:none;border-color:var(--accent)}
.age-unit{font-size:13px;color:var(--muted)}

/* EVA */
.eva-wrap{padding:4px 0}
.eva-row{display:flex;align-items:center;gap:12px}
.eva-row input[type=range]{flex:1;accent-color:var(--red)}
.eva-val{font-size:16px;font-weight:700;color:var(--red);min-width:44px;text-align:right}
.eva-sub{display:flex;justify-content:space-between;font-size:11px;color:var(--hint);margin-top:3px}

/* ORIENT */
.orient-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:7px}
.orient-card{border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .13s;user-select:none}
.orient-card:hover{border-color:var(--border-strong);color:var(--text);background:#fafafa}
.orient-card.s-green{background:var(--green-bg);border-color:var(--green-border);color:var(--green);font-weight:700}
.orient-card.s-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red);font-weight:700}
.orient-card.s-orange{background:var(--orange-bg);border-color:var(--orange-border);color:var(--orange);font-weight:700}
.orient-card.s-blue{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);font-weight:700}

/* ALERT BOX */
.alert{border-radius:var(--rs);padding:8px 13px;margin-bottom:10px;font-size:12px;font-weight:500}
.alert.info{background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent)}
.alert.warn{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}

/* SEP */
.sep{height:1px;background:var(--border);margin:11px 0}

/* FOOTER */
.footer{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn{padding:7px 15px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .12s}
.btn:hover{background:var(--bg)}

@media(max-width:580px){.card-prev{display:none}.orient-grid{grid-template-columns:1fr 1fr}}
@media print{.hdr,.footer,.btn,.btn-exp{display:none!important}.card-body{display:block!important}.card{box-shadow:none;border:1px solid #ddd}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">⚕</div>
  <div class="hdr-info">
    <div class="hdr-title">Urgences — Chirurgie Générale</div>

  </div>
  <div class="hdr-right">

function getAllSections() {
  if (!motif) return [buildMotifSection(), ...SEC_FIXES, SEC_CONSTANTES];
  const d = DATA;
  return [
    buildMotifSection(),
    ...SEC_FIXES,
    SEC_CONSTANTES,
    buildDynSection('signes',   'Signes fonctionnels',   '💬', '#F0FDF4', d.signes[motif]),
    buildDynSection('examen',   'Examen clinique',        '🔍', '#EFF6FF', d.examen[motif]),
    buildBioSection(),
    buildImgSection(),
    buildDiagSection(),
    buildPECSection(),
  ];
}

function buildMotifSection() {
  return {id:'motif', label:'Motif chirurgical', icon:'🩺', color:'#FEF2F2', _special:'motif'};
}
function buildDynSection(id, label, icon, color, blocks) {
  return {id, label, icon, color, blocks};
}

  const b = DATA.biologie[motif];
  return {id:'biologie', label:'Biologie', icon:'🧪', color:'#EFF6FF', blocks:[
    {lbl:'Bilan demandé', type:'check', items:[...b.bilan,'Aucun bilan']},

}

function render() {
  const cont = document.getElementById('sections');
  cont.innerHTML = '';
  getAllSections().forEach((sec, i) => {
    cont.appendChild(buildCard(sec, i === 0));
  });
  document.getElementById('hdr-sub').textContent = motif
    ? `Chirurgie Générale — ${MOTIFS.find(m=>m.id===motif)?.label}`
    : 'Sélectionnez le motif chirurgical';
  renderProgress();
}

function buildCard(sec, openDefault) {
  const card = document.createElement('div');
  card.className = 'card'; card.dataset.id = sec.id;

  const head = document.createElement('div');
  head.className = 'card-head' + (openDefault ? ' open' : '');
  head.innerHTML = `
    <div class="card-icon" style="background:${sec.color}">${sec.icon}</div>
    <div class="card-title">${sec.label}</div>
    <div class="card-prev" id="prev-${sec.id}"></div>
    <div class="card-chev${openDefault ? ' open' : ''}">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 3 11 8 6 13"/>
      </svg>
    </div>`;
  head.onclick = () => toggleCard(head);

  const body = document.createElement('div');
  body.className = 'card-body' + (openDefault ? ' open' : '');

  if (sec._special === 'motif') {
    body.appendChild(buildMotifBlock());
  } else {
    if (motif && !['identite','allergies','atcd','constantes'].includes(sec.id)) {
      const a = document.createElement('div');
      a.className = 'alert info';
      a.textContent = `Contenu adapté : ${MOTIFS.find(m=>m.id===motif)?.label}`;
      body.appendChild(a);
    }
    (sec.blocks || []).forEach(b => {
      if (b.type === 'age') { body.appendChild(buildAge()); return; }
      if (b.type === 'eva') { const l=makeLabel(b.lbl); body.appendChild(l); body.appendChild(buildEVA()); return; }
      if (b.type === 'orient') { const l=makeLabel(b.lbl||'Orientation décidée'); body.appendChild(l); body.appendChild(buildOrient(sec.id)); return; }
      const l = makeLabel(b.lbl); body.appendChild(l);
      if (b.type === 'check') body.appendChild(buildChips(b.items, false, sec.id));
      else if (b.type === 'radio') body.appendChild(buildChips(b.items, true, sec.id));
    });
  }

  card.appendChild(head); card.appendChild(body);
  return card;
}

function makeLabel(txt) {
  const d = document.createElement('div'); d.className = 'sec-lbl'; d.textContent = txt; return d;
}

function buildMotifBlock() {
  const wrap = document.createElement('div');
  const lbl = makeLabel('Sélectionnez le motif chirurgical principal');
  wrap.appendChild(lbl);
  const grid = document.createElement('div'); grid.className = 'chips';
  MOTIFS.forEach(m => {
    const chip = document.createElement('span');
    chip.className = 'chip radio' + (motif === m.id ? ' on' : '');
    chip.textContent = m.label;
    chip.onclick = () => { motif = m.id; render(); };
    grid.appendChild(chip);
  });
  wrap.appendChild(grid);
  return wrap;
}

function buildAge() {
  const wrap = document.createElement('div');
  const l = makeLabel('Âge'); wrap.appendChild(l);
  const row = document.createElement('div'); row.className = 'age-row';
  const inp = document.createElement('input');
  inp.type='number'; inp.min=0; inp.max=130; inp.className='age-in';
  inp.placeholder='—'; inp.value=ageVal;
  inp.oninput = () => { ageVal = inp.value; updatePrev('identite'); };
  const u = document.createElement('span'); u.className='age-unit'; u.textContent='ans';
  row.appendChild(inp); row.appendChild(u); wrap.appendChild(row);
  return wrap;
}

function buildEVA() {
  const wrap = document.createElement('div'); wrap.className='eva-wrap';
  const row = document.createElement('div'); row.className='eva-row';
  const sl = document.createElement('input');
  sl.type='range'; sl.min=0; sl.max=10; sl.step=1; sl.value=evaVal;
  const val = document.createElement('span'); val.className='eva-val'; val.textContent=evaVal+'/10';
  sl.oninput = () => { evaVal=parseInt(sl.value); val.textContent=evaVal+'/10'; updatePrev('constantes'); };
  row.appendChild(sl); row.appendChild(val); wrap.appendChild(row);
  const sub = document.createElement('div'); sub.className='eva-sub';
  sub.innerHTML='<span>0 — aucune</span><span>5 — modérée</span><span>10 — max</span>';
  wrap.appendChild(sub);
  return wrap;
}

function buildChips(items, radio, secId) {
  const grid = document.createElement('div'); grid.className='chips';
  items.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (radio ? ' radio' : '');
    chip.textContent = item;
    chip.onclick = () => {
      if (radio) grid.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      chip.classList.toggle('on');
      updatePrev(secId);
      renderProgress();
    };
    grid.appendChild(chip);
  });
  return grid;
}

function buildOrient(secId) {
  const grid = document.createElement('div'); grid.className='orient-grid';
  [
    {l:'Retour domicile',     cls:'s-green'},
    {l:'Hospitalisation chir.',cls:'s-blue'},
    {l:'Bloc en urgence',     cls:'s-red'},
    {l:'Réanimation / USC',   cls:'s-red'},
    {l:'Surveillance courte', cls:'s-orange'},
    {l:'Consultation diff.',  cls:'s-blue'},
    {l:'Transfert CHU',       cls:'s-orange'},
    {l:'HDJ / ambulatoire',   cls:'s-green'},
  ].forEach(o => {
    const c = document.createElement('div'); c.className='orient-card'; c.textContent=o.l;
    c.onclick = () => {
      grid.querySelectorAll('.orient-card').forEach(x=>x.className='orient-card');
      c.classList.add(o.cls); updatePrev(secId); renderProgress();
    };
    grid.appendChild(c);
  });
  return grid;
}

function updatePrev(secId) {
  const sec = document.querySelector(`.card[data-id="${secId}"]`);
  if (!sec) return;
  const chips = [...sec.querySelectorAll('.chip.on')].map(c=>c.textContent.replace('✓ ','').trim());
  const orient = sec.querySelector('.orient-card[class*="s-"]');
  const parts = [...chips];
  if (orient) parts.push(orient.textContent);
  if (secId==='identite' && ageVal) parts.unshift(ageVal+' ans');
  const p = document.getElementById('prev-'+secId);
  if (p) p.textContent = parts.join(' · ');
}

function toggleCard(head) {
  const body = head.nextElementSibling;
  const chev = head.querySelector('.card-chev');
  const open = body.classList.contains('open');
  body.classList.toggle('open',!open);
  head.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
}
function expandAll() { document.querySelectorAll('.card-head').forEach(h=>{h.classList.add('open');h.nextElementSibling.classList.add('open');h.querySelector('.card-chev').classList.add('open')}); }
function collapseAll() { document.querySelectorAll('.card-head').forEach(h=>{h.classList.remove('open');h.nextElementSibling.classList.remove('open');h.querySelector('.card-chev').classList.remove('open')}); }
function resetAll() {
  document.querySelectorAll('.chip.on').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.orient-card[class*="s-"]').forEach(c=>c.className='orient-card');
  ageVal=''; evaVal=5;
  document.querySelectorAll('.age-in').forEach(i=>i.value='');
  document.querySelectorAll('input[type=range]').forEach(r=>{r.value=5;r.nextSibling&&(r.nextSibling.textContent='5/10')});
  getAllSections().forEach(s=>updatePrev(s.id));
  renderProgress();
}

/* ════════════════════════════════════════════
   PROGRESS
════════════════════════════════════════════ */
function renderProgress() {
  const bar = document.getElementById('progress');
  const secIds = getAllSections().map(s=>s.id).filter(id=>id!=='motif');
  bar.innerHTML = '<span class="prog-label">Avancement</span>';
  secIds.forEach(id => {
    const dot = document.createElement('div'); dot.className = 'prog-dot';
    const sec = document.querySelector(`.card[data-id="${id}"]`);
    if (sec) {
      const filled = sec.querySelectorAll('.chip.on, .orient-card[class*="s-"]').length > 0;
      const ageIn = sec.querySelector('.age-in');
      if (filled || (ageIn && ageIn.value)) dot.classList.add('done');
    }
    bar.appendChild(dot);
  });
  const done = bar.querySelectorAll('.prog-dot.done').length;
  const total = bar.querySelectorAll('.prog-dot').length;
  const pct = document.createElement('span');
  pct.style.cssText='font-size:12px;color:var(--muted);margin-left:6px';
  pct.textContent = `${done}/${total} sections remplies`;
  bar.appendChild(pct);
}

/* ════════════════════════════════════════════
   EXPORT
════════════════════════════════════════════ */
function exportNote() {
  const now = new Date();
  const lines = [];
  lines.push('COMPTE-RENDU — URGENCES CHIRURGIE GÉNÉRALE');
  lines.push('═'.repeat(52));
  lines.push(`Date : ${now.toLocaleDateString('fr-FR')}   Heure : ${now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`);
  if (motif) lines.push(`Motif : ${MOTIFS.find(m=>m.id===motif)?.label}`);
  if (ageVal) lines.push(`Âge : ${ageVal} ans`);
  lines.push('');

  getAllSections().forEach(sec => {
    if (sec.id === 'motif') return;
    const card = document.querySelector(`.card[data-id="${sec.id}"]`);
    if (!card) return;
    const chips = [...card.querySelectorAll('.chip.on')].map(c=>c.textContent.replace('✓ ','').trim());
    const orient = card.querySelector('.orient-card[class*="s-"]');
    const parts = [...chips];
    if (orient) parts.push('→ '+orient.textContent);
    if (sec.id==='constantes') parts.push(`EVA : ${evaVal}/10`);
    if (parts.length) {
      lines.push(`▶ ${sec.label.toUpperCase()}`);
      lines.push(parts.join(' | '));
      lines.push('');
    }
  });

  lines.push('─'.repeat(52));
  lines.push('Document à valider et compléter par le chirurgien.');

  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `chir_gen_${now.toISOString().slice(0,10)}.txt`;
  a.click();
}

/* ════════════════════════════════════════════
   HORLOGE
════════════════════════════════════════════ */
function clock() {
  const n = new Date();
  document.getElementById('hdr-time').textContent =
    n.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'long'}) +
    ' · ' + n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
clock(); setInterval(clock, 30000);

/* INIT */
render();
</script>
</body>
