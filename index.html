<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedNote - Clinical Documentation Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: #667eea;
            margin: 0 auto;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
        }

        .section {
            padding: 20px;
        }

        .section h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #667eea;
            border-radius: 2px;
        }

        .symptom-checklist {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-group label {
            cursor: pointer;
            color: #555;
            font-size: 1em;
        }

        .checkbox-group label:hover {
            color: #333;
        }

        #report {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            min-height: 200px;
            color: #333;
            line-height: 1.6;
            font-size: 0.95em;
            font-family: 'Georgia', serif;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-generate {
            background: #667eea;
            color: white;
        }

        .btn-generate:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .btn-clear {
            background: #e0e0e0;
            color: #333;
        }

        .btn-clear:hover {
            background: #d0d0d0;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MedNote</h1>
            <p class="subtitle">Clinical Documentation Assistant</p>
            <div class="divider"></div>
        </header>

        <div class="content">
            <div class="section">
                <h2>Symptoms Checklist</h2>
                <div class="symptom-checklist">
                    <div class="checkbox-group">
                        <input type="checkbox" id="fever" value="Fever">
                        <label for="fever">Fever (elevated body temperature)</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="cough" value="Persistent cough">
                        <label for="cough">Persistent cough</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="headache" value="Headache">
                        <label for="headache">Headache</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="fatigue" value="Fatigue">
                        <label for="fatigue">Fatigue or weakness</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="sore-throat" value="Sore throat">
                        <label for="sore-throat">Sore throat</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="congestion" value="Nasal congestion">
                        <label for="congestion">Nasal congestion</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="chills" value="Chills">
                        <label for="chills">Chills</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="nausea" value="Nausea">
                        <label for="nausea">Nausea</label>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-generate" onclick="generateReport()">Generate Report</button>
                    <button class="btn-clear" onclick="clearAll()">Clear All</button>
                </div>
            </div>

            <div class="section">
                <h2>Medical Report</h2>
                <div id="report">Select symptoms and click "Generate Report" to create formatted documentation.</div>
            </div>
        </div>
    </div>

    <script>
        function generateReport() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            const selectedSymptoms = Array.from(checkboxes).map(cb => cb.value);

            if (selectedSymptoms.length === 0) {
                document.getElementById('report').textContent = 'Please select at least one symptom to generate a report.';
                return;
            }

            const timestamp = new Date().toLocaleString();
            const symptomsList = selectedSymptoms.join('\n• ');

            const reportText = `PATIENT CLINICAL DOCUMENTATION REPORT\nGenerated: ${timestamp}\n\nPRESENTING SYMPTOMS:\n• ${symptomsList}\n\nCLINICAL IMPRESSION:\nPatient presents with the above reported symptoms. Physical examination and vital signs assessment recommended. Further diagnostic evaluation may be warranted based on clinical judgment.\n\nRECOMMENDATIONS:\n• Continue symptom monitoring\n• Document any changes in patient condition\n• Follow up as clinically indicated\n\n---\nThis report was generated using MedNote Clinical Documentation Assistant.`;

            document.getElementById('report').textContent = reportText;
        }

        function clearAll() {
            document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.checked = false;
            });
            document.getElementById('report').textContent = 'Select symptoms and click "Generate Report" to create formatted documentation.';
        }
    </script>
</body>
</html>
